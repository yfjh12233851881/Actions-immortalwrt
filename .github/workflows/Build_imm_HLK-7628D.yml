name: Build_imm_HLK_7628D

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: ' ← 选择是否开启 SSH 调试专业人员使用'
        required: false
        default: false
        type: boolean
      log_switch:
        description: " ← 单线程编译 默认4线程"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: 'config/hlk7628d.config'
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  DIY_P6_SH: diy-part6.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Show hardware info
      run: |
        chmod 755 ./scripts/show_hardware_info.sh
        ./scripts/show_hardware_info.sh

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: false
        dotnet: false
        haskell: false
        large-packages: false
        docker-images: false
        swap-storage: true

    - name: space usage check  
      run: |
        df -H

    - name: Initialization environment
      id: init
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install --no-install-recommends $(curl -fsSL https://raw.githubusercontent.com/xuxin1955/depend_ubuntu2204_openwrt/refs/heads/main/depend_ubuntu2204_openwrt)
        echo "status=success" >> ${GITHUB_OUTPUT}

        
    - name: mkbootimg build
      run: |
        wget https://github.com/xuxin1955/depend_ubuntu2204_openwrt/releases/download/ubuntu_26.04_LTS_mkbootimg/mkbootimg_34.0.5-12build1_all.deb
        sudo dpkg -i mkbootimg_34.0.5-12build1_all.deb
        sudo apt-get install -f -y
        # 验证安装
        mkbootimg --help || true
        MKBOOTIMG_PATH=$(which mkbootimg)
        if [ -n "$MKBOOTIMG_PATH" ]; then
        echo "mkbootimg found at: $MKBOOTIMG_PATH"
        file "$MKBOOTIMG_PATH"
        else
        echo "❌ mkbootimg not found in PATH!"
        fi
        
        sudo timedatectl set-timezone "${TZ}"
        
        
    - name: Ensure Python build tools
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install Unidecode
        
    - name: Clone source code
      id: codes
      if: steps.init.outputs.status == 'success' && success()
      run: |
        git clone "$REPO_URL" -b "$REPO_BRANCH" openwrt
        cd openwrt
        git pull origin "$REPO_BRANCH"
        git log --oneline -1
        cd ..
        if [ -n "$GITHUB_OUTPUT" ]; then
        echo "status=success" >> "$GITHUB_OUTPUT"
        else
        echo "::set-output name=status::success"
        fi

       
    - name: Free up disk space
      run: |
        sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir}
        sudo chown -R $USER:$GROUPS /mnt/openwrt
        ln -sfn /mnt/openwrt/dl openwrt/dl
        ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
        ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
        df -H
        
    - name: Load custom DIY_P6_SH
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P6_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P6_SH

    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        
        ./scripts/feeds install -a -f
        
    - name: remove warning
      run: |
        chmod 755 $GITHUB_WORKSPACE/scripts/diy-part.sh
        $GITHUB_WORKSPACE/scripts/diy-part.sh
        

    - name: Configuration Customization
      run: |
      
        cp -fv "${CONFIG_FILE}" openwrt/.config
        cd openwrt && make defconfig
        
    - name: SSH 调试有效时间6h! 连接后输入q 输入exit即可退出，自动继续后续编译流程
      uses: mxschmitt/action-tmate@master
      if: ${{ inputs.ssh || contains(github.event.action, 'ssh') }}
      
    - name: 自动上传最新源码生成.config编译配置
      uses: actions/upload-artifact@main
      with:
       name: build-config
       path: |
         ${{ github.workspace }}/openwrt/.config
         ${{ github.workspace }}/openwrt/feeds.conf.default
       include-hidden-files: true      
      
    - name: Download package
      working-directory: ./openwrt
      run: |
        make download -j4 V=s
        find dl -size -1024c -delete

    - name: 查看 openwrt 目录
      run: ls -la openwrt/
      
           ls -l .config
      
           ls -la openwrt/.config

    - name: Compile the OpenWrt
      id: compile
      run: |
        cd openwrt/
        make defconfig
        if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s
        else
            make -j4 V=s
        fi
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}/*

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "🚀 OpenWrt firmware for HILINK HLK-7628DNA WIFI路由模块" >> release.txt
        echo "----------------------" >> release.txt
        echo "设备: HILINK HLK-7628DNA WIFI路由模块" >> release.txt
        echo "时间: $(date +"%Y-%m-%d %H:%M")" >> release.txt
        echo "内核版本: $(grep -h "kmod-usb2" ${{ env.FIRMWARE }}/*.manifest 2>/dev/null | awk -F' - ' '{print $2}' | grep -oP '6\.[0-9]+\.[0-9]+' | head -1 || echo '未知')" >> release.txt
        echo "源码仓库: ${{ env.REPO_URL }}" >> release.txt
        echo "分支: ${{ env.REPO_BRANCH }}" >> release.txt
        echo "管理地址: 192.168.100.1" >> release.txt
        echo "登录账号: root" >> release.txt
        echo "密码: 无" >> release.txt
        echo "" >> release.txt
        echo "### 主要插件" >> release.txt
        echo "#### luci-app 系列" >> release.txt
        grep -h "luci-app-" ${{ env.FIRMWARE }}/*.manifest 2>/dev/null | awk -F':' '{print $NF}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -oP 'luci-app-[a-zA-Z0-9_-]+' | sort -u | sed 's/^/- /' >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

        
    - name: Generate file list
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      run: |
        find ${{ env.FIRMWARE }} -type f > file_list.txt
        echo "Collected files:"
        cat file_list.txt
        test -s file_list.txt || { echo "::error::No firmware files found"; exit 1; }



    - name: Upload firmware to release
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      uses: ncipollo/release-action@main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag: ${{ steps.tag.outputs.release_tag }}
        bodyFile: release.txt
        artifacts: ${{ env.FIRMWARE }}/**/*
        artifactErrorsFailBuild: false
        allowUpdates: true
        draft: false
        prerelease: false





    - name: Delete old workflow runs via GitHub API
      if: always()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RETAIN_DAYS: 7
        KEEP_MINIMUM_RUNS: 5
      run: |
        RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100")
        CUTOFF=$(date -d "-${RETAIN_DAYS} days" +%s)
        DEL_IDS=$(echo "$RUNS" | jq -r --arg cutoff "$CUTOFF" --argjson keep "$KEEP_MINIMUM_RUNS" '
          [.workflow_runs[]
            | select((now - (.created_at | fromdateiso8601)) > ($cutoff | tonumber))
            | {id, created_at}
          ]
          | sort_by(.created_at)
          | .[:-$keep]
          | .[].id
        ')
        if [[ -z "$DEL_IDS" ]]; then
          echo "No old runs to delete."
        else
          echo "$DEL_IDS" | while read run_id; do
            echo "Deleting run $run_id"
            curl -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
          done
        fi



