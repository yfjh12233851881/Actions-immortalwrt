name: Build_imm_高通_8916

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      info:
        description: ' 已开启 ccache cache-dl 缓存加速 '
        required: false
        default: '不改配置二次编译速度大幅提升'
        type: string
      ssh:
        description: ' ← 选择是否开启 SSH 调试专业人员使用'
        required: false
        default: false
        type: boolean
      profile:
        description: ' ↓ 支持多款型号 手动选择要编译的机型 ↓ '
        type: choice
        options:
          - jz02v10
          - ufi001c
          - ufi001b
          - ufi103s
          - qrzl903
          - w001
          - ufi003
          - uz801
          - mf32
          - mf601
          - wf2
          - sp970v11
          - sp970v10
        default: jz02v10
        required: true


env:
  REPO_URL: https://github.com/xuxin1955/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ${{ format('config/{0}.config', github.event.inputs.profile) }}
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Show hardware info
      run: |
        chmod 755 ./scripts/show_hardware_info.sh
        ./scripts/show_hardware_info.sh
  
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: false
        dotnet: false
        haskell: false
        large-packages: false
        docker-images: false
        swap-storage: false
        
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update && sudo -E apt-get -y install --no-install-recommends $(curl -fsSL https://raw.githubusercontent.com/xuxin1955/depend_ubuntu2204_openwrt/refs/heads/main/depend_ubuntu2204_openwrt)

    - name: Cache mkbootimg deb
      uses: actions/cache@v5
      with:
        path: downloads/mkbootimg_34.0.5-12build1_all.deb
        key: mkbootimg-34.0.5-12build1
        restore-keys: |
          mkbootimg-

    - name: mkbootimg build
      run: |
        mkdir -p downloads
        cd downloads

        if [ ! -f mkbootimg_34.0.5-12build1_all.deb ]; then
          echo "📥 mkbootimg deb not cached, downloading..."
          wget https://github.com/xuxin1955/depend_ubuntu2204_openwrt/releases/download/ubuntu_26.04_LTS_mkbootimg/mkbootimg_34.0.5-12build1_all.deb
        else
          echo "✅ mkbootimg deb restored from cache"
        fi

        sudo dpkg -i mkbootimg_34.0.5-12build1_all.deb || true
        sudo apt-get install -f -y

        mkbootimg --help || true

        MKBOOTIMG_PATH=$(which mkbootimg)
        if [ -n "$MKBOOTIMG_PATH" ]; then
          echo "✅ mkbootimg found at: $MKBOOTIMG_PATH"
          file "$MKBOOTIMG_PATH"
        else
          echo "❌ mkbootimg not found in PATH!"
        fi

        sudo timedatectl set-timezone "$TZ"
        sudo chmod 777 /mnt
        df -hT


        
    - name: Ensure Python build tools
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install Unidecode



    - name: Clone source code
      working-directory: /mnt
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /mnt/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom DIY_P1_SH
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        
    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds clean
        rm -rf feeds
        ./scripts/feeds update -a
        
        echo "📌 Local packages feed:"
        git -C feeds/packages log -1 --format="%H %ci %s"

        echo "📌 Actual remote of feeds/packages:"
        git -C feeds/packages remote get-url origin

        echo "📌 Remote HEAD actually used:"
        git -C feeds/packages ls-remote HEAD || true

    - name: Install feeds
      run: |
        cd openwrt
        ./scripts/feeds install -a -f


    - name: remove warning
      run: |
        chmod 755 $GITHUB_WORKSPACE/scripts/diy-part.sh
        $GITHUB_WORKSPACE/scripts/diy-part.sh

    - name: Load custom DIY_P2_SH
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        
    - name: SSH 调试有效时间6h! 连接后输入q 输入exit即可退出，自动继续后续编译流程
      uses: mxschmitt/action-tmate@master
      if: ${{ inputs.ssh || contains(github.event.action, 'ssh') }}
      
      
    - name: make defconfig
      run: |
        cd openwrt
        make defconfig V=s

       
    - name: 查看 openwrt 目录
      run: ls -la openwrt/
      
           ls -l .config
      
           ls -la openwrt/.config

 
    - name: 自动上传最新源码生成.config编译配置
      uses: actions/upload-artifact@main
      with:
       name: build-config
       path: |
         ${{ github.workspace }}/openwrt/.config
         ${{ github.workspace }}/openwrt/feeds.conf.default
       include-hidden-files: true

    - name: Cache dl
      id: cache-dl
      uses: actions/cache@v5
      with:
        path: openwrt/dl
        key: dl-${{ runner.os }}-${{ hashFiles('openwrt/feeds.conf.default') }}
        restore-keys: |
          dl-${{ runner.os }}-


    - name: Download package
      run: |
        if [[ "${{ steps.cache-dl.outputs.cache-hit }}" == "true" ]]; then
          echo "✅ dl cache hit"
        else
          echo "⚠️ dl cache miss"
        fi

        cd openwrt

        echo "⬇️ Downloading..."
        output=$(make download -j$(nproc) -k V=s 2>&1)

        if echo "$output" | grep -qE "Hash verification failed|checksum mismatch|MD5.*mismatch|sha256sum.*WARNING"; then
          echo "❌ Failed packages and their logs:"
          echo "$output" | grep -E "Hash verification failed|checksum mismatch|MD5.*mismatch|sha256sum.*WARNING"
          echo ""
          echo "Detailed logs:"
          echo "$output" | grep -E "Hash verification failed|checksum mismatch" | sed 's/.*failed for //;s/.*mismatch //' | while read f; do
            pkg=$(basename "$f" | sed 's/\.[^.]*$//')
            echo ""
            echo "🔍 $pkg (file: $(basename "$f"))"
            echo "$output" | grep -A10 -B5 "$pkg" || true
          done
        fi
      shell: bash

    - name: Compute toolchain hash
      id: tc_hash
      run: |
        cd openwrt
        TOOLCHAIN_COMMIT=$(git log -1 --format=%H -- toolchain/ include/toolchain-build.mk)
        echo "hash=$TOOLCHAIN_COMMIT" >> $GITHUB_OUTPUT

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ccache-${{ runner.os }}-${{ steps.tc_hash.outputs.hash }}
        restore-keys: |
          ccache-${{ runner.os }}-



    - name: Cache toolchain
      uses: actions/cache@v5
      with:
        path: |
          openwrt/staging_dir/toolchain-*
          openwrt/staging_dir/host
          openwrt/build_dir/host
          openwrt/build_dir/toolchain-*
        key: toolchain-${{ runner.os }}-${{ steps.tc_hash.outputs.hash }}
        restore-keys: |
          toolchain-${{ runner.os }}-

    - name: Configure ccache
      run: |
        mkdir -p $HOME/.ccache
        echo "max_size = 10G" > $HOME/.ccache/ccache.conf
        echo "compiler_check = string:${{ steps.tc_hash.outputs.hash }}" >> $HOME/.ccache/ccache.conf

       
    - name: make -j$(nproc)
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"

        export CCACHE_DIR=$HOME/.ccache
        export CCACHE_BASEDIR=$PWD

        set +e
        make -j$(nproc) CC="ccache gcc" CXX="ccache g++"
        BUILD_EXIT=$?
        set -e

        if [ $BUILD_EXIT -eq 0 ]; then
          echo "✅ 并行编译成功"
        else
          echo "⚠️ 并行编译失败，切换到单线程详细模式..."
          set +e
          make -j8 V=s CC="ccache gcc" CXX="ccache g++"
          VERBOSE_EXIT=$?
          set -e
          exit $VERBOSE_EXIT
        fi

        echo "✅ ccache 统计："
        ccache -s

        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
      shell: bash





    - name: df -hT
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        if [ "${UPLOAD_GOFILE}" = "true" ] && [ -n "${{ steps.gofile.outputs.url }}" ]; then
          echo "🔗 GoFile" >> release.txt
        fi
        echo "" >> release.txt
        {
          echo "## 高通8916系列 immortalwrt"
          echo "- 管理地址: 192.168.100.1"
          echo "  内核版本: $(grep -h "kmod-usb2" ${{ env.FIRMWARE }}/*.manifest 2>/dev/null | awk -F' - ' '{print $2}' | grep -oP '6\.[0-9]+\.[0-9]+' | head -1 || echo '未知')"
          echo "  默认用户: root"
          echo "  默认密码: 空"
          echo ""
          echo "### 主要插件"
          echo "#### luci-app 系列"
          grep -h "luci-app-" ${{ env.FIRMWARE }}/*.manifest 2>/dev/null | awk -F':' '{print $NF}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -oP 'luci-app-[a-zA-Z0-9_-]+' | sort -u | sed 's/^/- /'
        } >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

 
    - name: Generate file list
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      run: |
        find ${{ env.FIRMWARE }} -type f > file_list.txt
        echo "Collected files:"
        cat file_list.txt
        test -s file_list.txt || { echo "::error::No firmware files found"; exit 1; }



    - name: Upload firmware to release
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      uses: ncipollo/release-action@main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag: ${{ steps.tag.outputs.release_tag }}
        bodyFile: release.txt
        artifacts: ${{ env.FIRMWARE }}/**/*
        artifactErrorsFailBuild: false
        allowUpdates: true
        draft: false
        prerelease: false

    - name: Delete old workflow runs via GitHub API
      if: always()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RETAIN_DAYS: 2
        KEEP_MINIMUM_RUNS: 2
      run: |
        RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100")
        CUTOFF=$(date -d "-${RETAIN_DAYS} days" +%s)
        DEL_IDS=$(echo "$RUNS" | jq -r --arg cutoff "$CUTOFF" --argjson keep "$KEEP_MINIMUM_RUNS" '
          [.workflow_runs[]
            | select((now - (.created_at | fromdateiso8601)) > ($cutoff | tonumber))
            | {id, created_at}
          ]
          | sort_by(.created_at)
          | .[:-$keep]
          | .[].id
        ')
        if [[ -z "$DEL_IDS" ]]; then
          echo "No old runs to delete."
        else
          echo "$DEL_IDS" | while read run_id; do
            echo "Deleting run $run_id"
            curl -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
          done
        fi
        